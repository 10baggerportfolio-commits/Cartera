<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Bagger Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#f7f7f5;--bg2:#fff;--bg3:#f0f0ed;--text:#1a1a18;--text2:#6b6b66;--text3:#9e9e99;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--green:#0f6e56;--gbg:#e1f5ee;--blue:#185fa5;--bbg:#e6f1fb;--amber:#854f0b;--abg:#faeeda;--red:#a32d2d;--rbg:#fcebeb;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2e2e2b;--text:#e8e8e4;--text2:#9e9e99;--text3:#6b6b66;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--green:#5dcaa5;--gbg:#04342c;--blue:#85b7eb;--bbg:#042c53;--amber:#ef9f27;--abg:#412402;--red:#f09595;--rbg:#501313}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.lcard{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:2.5rem;width:100%;max-width:380px}
.llogo{font-size:24px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.lsub{font-size:13px;color:var(--text2);margin-bottom:2rem}
.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
input[type=password],input[type=text]{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:inherit}
input:focus{border-color:var(--blue)}
.btnp{width:100%;padding:10px;border-radius:var(--rs);background:var(--text);color:var(--bg2);border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.btnp:hover{opacity:.85}
#lerr{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
.ssec{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid var(--border)}
.hint{font-size:11px;color:var(--text3);line-height:1.6;margin-top:4px}
#dash{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.brand{font-size:15px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.bl{background:var(--gbg);color:var(--green)}.bd{background:var(--abg);color:var(--amber)}.bc{background:var(--bbg);color:var(--blue)}
.tright{display:flex;align-items:center;gap:8px}
.bsm{font-size:12px;padding:5px 12px;border-radius:var(--rs);cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit}
.bsm:hover{background:var(--bg3)}
.utime{font-size:11px;color:var(--text3)}
.tabs{display:flex;padding:0 20px;background:var(--bg2);border-bottom:0.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:13px;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;font-weight:500}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.main{padding:18px 20px;flex:1}
.sbar{font-size:11px;color:var(--text3);padding:7px 20px;text-align:right;border-top:0.5px solid var(--border);background:var(--bg2)}
.pbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.pbtn.active{background:var(--text);color:var(--bg2);border-color:var(--text)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg3);border-radius:var(--rs);padding:13px 15px}
.mlbl{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.mval{font-size:22px;font-weight:700;letter-spacing:-0.5px;line-height:1.1}
.msub{font-size:11px;margin-top:3px;color:var(--text2)}
.pos{color:var(--green)}.neg{color:var(--red)}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.ch{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.ct{font-size:13px;font-weight:600;letter-spacing:-0.2px}
.cm{font-size:11px;color:var(--text2)}
.ox{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;color:var(--text2);font-weight:500;padding:8px 13px;text-align:right;border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap}
th:first-child{text-align:left}
td{padding:9px 13px;text-align:right;border-bottom:0.5px solid var(--border);white-space:nowrap;vertical-align:middle}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.tsub{font-size:10px;color:var(--text3);display:block;margin-top:1px;font-weight:400}
.risk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:600}
.rlo{background:var(--gbg);color:var(--green)}.rmd{background:var(--abg);color:var(--amber)}.rhi{background:var(--rbg);color:var(--red)}
.ilink{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:4px;border:0.5px solid var(--border2);color:var(--text2);text-decoration:none;font-size:11px;font-weight:600;margin-left:4px;vertical-align:middle;gap:3px}
.ilink:hover{background:var(--bbg);color:var(--blue);border-color:var(--blue)}
.ilink-tesis{background:var(--gbg);color:var(--green);border-color:var(--green)}
.ilink-tesis:hover{background:var(--green);color:#fff}
.ilink-modelo{background:var(--bbg);color:var(--blue);border-color:var(--blue)}
.ilink-modelo:hover{background:var(--blue);color:#fff}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:600px){.cgrid{grid-template-columns:1fr}}
.cwrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.ctit{font-size:10px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2)}
.op-ap{background:var(--gbg);color:var(--green);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.op-ci{background:var(--rbg);color:var(--red);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.op-au{background:var(--bbg);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.op-re{background:var(--abg);color:var(--amber);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.ebox{background:var(--abg);border:0.5px solid var(--amber);border-radius:var(--rs);padding:14px;font-size:13px;color:var(--amber);margin-bottom:16px;line-height:1.7}

/* ── MOBILE ────────────────────────────────────────────── */
@media(max-width:640px){
  .main{padding:12px 12px}
  .topbar{padding:10px 12px}
  .brand{font-size:13px}
  .utime{display:none}
  .tabs{padding:0 12px}
  .tab{font-size:12px;padding:8px 12px}
  .mgrid{grid-template-columns:1fr 1fr!important;gap:8px}
  .metric{padding:10px 12px}
  .mval{font-size:18px}
  .cgrid{grid-template-columns:1fr!important}
  .cwrap{padding:12px}
  /* Tabla: scroll horizontal con columnas prioritarias */
  .ox{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px;font-size:11px}
  th,td{padding:7px 10px}
  /* Ocultar columnas menos importantes en móvil */
  .col-hide-mobile{display:none}
  /* Donut panel lateral → debajo en móvil */
  .donut-wrapper{flex-direction:column!important}
  .tesis-panel-mobile{width:100%!important;border-left:none!important;border-top:0.5px solid var(--border)!important;max-height:200px!important}
  /* Gráficos más pequeños */
  .chart-rent{height:160px!important}
  /* Cards En desarrollo */
  .dev-grid{grid-template-columns:1fr!important}
  /* Botones período */
  .pbtns{gap:4px}
  .pbtn{font-size:10px;padding:4px 9px}
  /* Links más compactos */
  .ilink{font-size:10px;padding:0 6px;height:20px}
  /* Topbar compacto */
  .bsm{font-size:11px;padding:4px 8px}
}
</style>
</head>
<body>
<div id="login">
  <div class="lcard">
    <div class="llogo">10Bagger Portfolio</div>
    <div class="lsub">Panel privado de inversiones</div>
    <label class="lbl">Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btnp" onclick="doLogin()">Entrar</button>
    <div id="lerr"></div>
    <div class="ssec">
      <label class="lbl">ID de Google Sheet</label>
      <input type="text" id="sid" value="1sRkg-yB94zBcvlBuwPsR8DAOpAL-06YB5MCcuQ4wmQc">
      <div class="hint">Compartido como "Cualquiera con el enlace puede ver"</div>
    </div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="brand">10Bagger Portfolio <span class="badge bc" id="badge">⟳ Cargando</span></div>
    <div class="tright">
      <span class="utime" id="lupd"></span>
      <button class="bsm" onclick="loadAll()">↻ Actualizar</button>
      <button class="bsm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('rent')">Rentabilidad</div>
    <div class="tab" onclick="showTab('10b')">10Bagger</div>
    <div class="tab" onclick="showTab('est')">Estudiados</div>
    <div class="tab" onclick="showTab('dev')">En desarrollo</div>
  </div>
  <div class="main" id="mc"><div style="padding:3rem;text-align:center;color:var(--text2)"><span class="spin"></span> Conectando...</div></div>
  <div class="sbar" id="sb"></div>
</div>

<script>
const PWD = "suscriptores2026";
const COLS = ["#378ADD","#1D9E75","#EF9F27","#D4537E","#533AB7","#D85A30","#639922","#3B8BD4","#BA7517","#0F6E56","#993556","#5F5E5A","#C55A11","#4472C4","#ED7D31","#A9D18E"];
let SID = "1sRkg-yB94zBcvlBuwPsR8DAOpAL-06YB5MCcuQ4wmQc";
let D = {pos10b:[], posQH:[], rend:[]};
let CH = {};
let CUR = 'rent';
let curPeriod = 'ytd';

// ── NÚMEROS ───────────────────────────────────────────────────
// Convierte cualquier formato numérico a float
// "70000" → 70000, "70.000" → 70000, "1.670,00" → 1670, "9,2%" → 9.2
function toNum(v) {
  if (v === null || v === undefined) return null;
  const s = String(v).trim().replace(/[€$£%\s]/g, '').replace(/[^\d,.\-]/g, '');
  if (!s || s === '—') return null;
  let n;
  if (s.includes('.') && s.includes(',')) {
    // 1.670,00 → punto=miles, coma=decimal
    n = parseFloat(s.replace(/\./g,'').replace(',','.'));
  } else if (s.includes(',')) {
    // 9,2 → decimal español
    n = parseFloat(s.replace(',','.'));
  } else if (s.includes('.')) {
    const parts = s.split('.');
    // 70.000 → solo punto, 3 decimales = miles
    if (parts.length === 2 && parts[1].length === 3) {
      n = parseFloat(parts[0] + parts[1]);
    } else {
      n = parseFloat(s);
    }
  } else {
    n = parseFloat(s);
  }
  return isNaN(n) ? null : n;
}

function fmtP(v, d=1) {
  if (v === null || v === undefined) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(d) + '%';
}
function nowStr() { return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function setSt(m) { document.getElementById('sb').innerHTML = m; }
function setBadge(c,t) { const b=document.getElementById('badge'); b.className='badge '+c; b.textContent=t; }
function killCharts() { Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}}); CH={}; }
function fmt(v) { return v!==null&&v!==undefined&&String(v).trim()!==''?String(v).trim():'—'; }

// ── AUTH ─────────────────────────────────────────────────────
function doLogin() {
  if (document.getElementById('pwd').value !== PWD) {
    document.getElementById('lerr').textContent = 'Contraseña incorrecta'; return;
  }
  document.getElementById('lerr').textContent = '';
  SID = document.getElementById('sid').value.trim() || SID;
  document.getElementById('login').style.display = 'none';
  document.getElementById('dash').style.display = 'flex';
  loadAll();
}
function doLogout() {
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

// ── FETCH ─────────────────────────────────────────────────────
async function gsheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const txt = await res.text();
  const m = txt.match(/setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Sin respuesta para hoja: ' + sheetName);
  const tbl = JSON.parse(m[1]).table;
  if (!tbl || !tbl.rows) return [];
  // Devolver filas como arrays: primero f (formateado), luego v (valor bruto)
  return tbl.rows.map(row => row.c.map(c => {
    if (!c) return null;
    // Para números: usar v (valor numérico bruto) directamente
    if (c.v !== null && c.v !== undefined && typeof c.v === 'number') return c.v;
    // Para strings: usar f si existe, si no v
    if (c.f !== null && c.f !== undefined) return c.f;
    return c.v !== null && c.v !== undefined ? c.v : null;
  }));
}

// ── PARSERS ───────────────────────────────────────────────────
function parsePosiciones(rows) {
  const skip = ['POSICIONES','Rellena','Ticker','TOTAL','CAGR'];
  return rows.filter(r => {
    const t = String(r[0]||'').trim();
    // Filtrar por ticker válido — cualquier fila con ticker no vacío y no cabecera
    return t && t.length > 1 && !skip.some(s => t.startsWith(s));
  }).map(r => {
    const precioNum = typeof r[4]==='number' ? r[4] : toNum(r[4]);
    const poNum     = r[12] ? (typeof r[12]==='number' ? r[12] : toNum(r[12])) : null;
    const cagr3y    = precioNum && poNum && poNum > 0
      ? (Math.pow(poNum / precioNum, 1/3) - 1) * 100
      : null;
    // Fecha entrada: puede venir como "12/02/2024" o Date object
    const fechaRaw = r[14] ? String(r[14]).trim() : '';
    let antiguedad = null;
    if (fechaRaw) {
      let d;
      if (fechaRaw.includes('/')) {
        const parts = fechaRaw.split('/');
        // formato DD/MM/YYYY
        d = new Date(parts[2], parts[1]-1, parts[0]);
      } else if (fechaRaw.match(/Date\((\d+),(\d+),(\d+)\)/)) {
        const m = fechaRaw.match(/Date\((\d+),(\d+),(\d+)\)/);
        d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
      } else {
        d = new Date(fechaRaw);
      }
      if (!isNaN(d)) {
        antiguedad = ((new Date() - d) / (1000 * 60 * 60 * 24 * 365.25));
      }
    }
    return {
      ticker:    String(r[0]||'').trim(),
      empresa:   fmt(r[1]),
      moneda:    fmt(r[2]),
      ntit:      fmt(r[3]),
      precio:    fmt(r[4]),
      precioNum,
      peso:      typeof r[7]==='number' ? r[7]*100 : toNum(r[7]),
      pesoFmt:   typeof r[7]==='number' ? (r[7]*100).toFixed(1)+'%' : fmt(r[7]),
      riesgo:    r[9] ? String(r[9]).trim() : '—',
      urlTesis:  r[10] && String(r[10]).startsWith('http') ? String(r[10]).trim() : '',
      urlModelo: r[11] && String(r[11]).startsWith('http') ? String(r[11]).trim() : '',
      tieneTesis:  r[10] && String(r[10]).trim() === 'Disponible',
      tieneModelo: r[11] && String(r[11]).trim() === 'Disponible',
      po:        poNum ? fmt(r[12]) : '—',
      cagr3y,
      geo:       r[13] ? String(r[13]).trim() : '',
      fechaEntrada: fechaRaw,
      antiguedad,
      resumen:   r[15] ? String(r[15]).trim() : '',
    };
  });
}

// REND_SIMPLE: cabecera en fila 0, datos en filas 1+
// Cols: Periodo, Dias, b10_ini, b10_fin, spx_ini, spx_fin, ndx_ini, ndx_fin, fx_ini, fx_fin
// fx = EUR/USD (cuántos dólares vale 1 euro)
// Ajuste EUR: rent_eur = (1 + rent_usd) / (1 + var_fx) - 1
function parseRend(rows) {
  const años = ['2022','2023','2024','2025','2026'];
  return rows.filter(r => {
    if (!r || !r[0]) return false;
    const p = String(r[0]).trim();
    return años.some(a => p.startsWith(a));
  }).map(r => {
    const v = i => typeof r[i]==='number' ? r[i] : toNum(r[i]);
    const fx_ini = v(8), fx_fin = v(9);
    // Rentabilidad de índices ajustada a EUR
    // Si fx sube (dólar se debilita), rentabilidad EUR < USD
    const spx_ini = v(4), spx_fin = v(5);
    const ndx_ini = v(6), ndx_fin = v(7);
    // Rentabilidad ajustada a EUR por período:
    // rent_eur = (1 + rent_usd) / (1 + var_fx_eurusd) - 1
    // var_fx = fx_fin/fx_ini - 1  (fx en EUR/USD)
    // Si el euro se aprecia (fx sube), la rentabilidad en EUR baja
    const var_fx = fx_ini && fx_fin ? fx_fin / fx_ini : 1;
    const spx_rent_eur = spx_ini && spx_fin ? ((spx_fin/spx_ini) / var_fx) : null;
    const ndx_rent_eur = ndx_ini && ndx_fin ? ((ndx_fin/ndx_ini) / var_fx) : null;
    return {
      label:   String(r[0]).trim(),
      dias:    v(1),
      b10_ini: v(2), b10_fin: v(3),
      spx_ini, spx_fin,
      ndx_ini, ndx_fin,
      fx_ini,  fx_fin,
      // Rentabilidades ajustadas EUR (factores multiplicativos, no %)
      spx_eur: spx_rent_eur,
      ndx_eur: ndx_rent_eur,
    };
  }).filter(r => r.dias && r.dias > 0);
}

// ── PARSER HISTORICO MENSUAL ─────────────────────────────────
// Cols: 0=Fecha, 1=Valor_10B, 2=Valor_QH, 3=NDX (4=SPX opcional)
function parseHist(rows) {
  return rows.filter(r => {
    const f = String(r[0]||'').trim();
    return f.match(/^\d{4}-\d{2}-\d{2}$/) && r[1];
  }).map(r => ({
    fecha: String(r[0]).trim(),
    b10:   typeof r[1]==='number' ? r[1] : toNum(r[1]),
    qh:    r[2] ? (typeof r[2]==='number' ? r[2] : toNum(r[2])) : null,
    ndx:   r[3] ? (typeof r[3]==='number' ? r[3] : toNum(r[3])) : null,
    spx:   r[4] ? (typeof r[4]==='number' ? r[4] : toNum(r[4])) : null,
  })).filter(r => r.b10 && r.b10 > 0);
}

// ── PARSER OPERACIONES ───────────────────────────────────────
function parseOps(rows) {
  const tipos = ['APERTURA','CIERRE','AUMENTO','RECORTE','RCORTE'];
  return rows.filter(r => {
    const t = String(r[3]||'').trim().toUpperCase();
    return r[0] && r[1] && tipos.some(x => t.includes(x));
  }).map(r => ({
    empresa: String(r[0]||'').trim(),
    fecha:   String(r[1]||'').trim(),
    ticker:  String(r[2]||'').trim(),
    tipo:    String(r[3]||'').trim().toUpperCase().replace('RCORTE','RECORTE'),
    cambio:  (() => {
      const v = r[4];
      if (v === null || v === undefined) return '—';
      // Si viene como número decimal (0.196 = 19.6%)
      if (typeof v === 'number') return (v * 100).toFixed(1) + '%';
      // Si ya viene como string con % ("19,6%")
      const s = String(v).trim();
      if (s.includes('%')) return s;
      // String sin % — convertir
      const n = parseFloat(s.replace(',','.'));
      return isNaN(n) ? s : (n * 100).toFixed(1) + '%';
    })(),
    precio:  String(r[5]||'').trim(),
  }));
}

// ── CARGA ─────────────────────────────────────────────────────
async function loadAll() {
  setBadge('bc','⟳ Cargando');
  setSt('<span class="spin"></span> Conectando...');
  try {
    const [r10b, rEst, rRend, rOps, rHist, rDev] = await Promise.all([
      gsheet('POSICIONES_10BAGGER'),
      gsheet('ESTUDIADOS'),
      gsheet('REND_SIMPLE'),
      gsheet('OPERACIONES'),
      gsheet('HISTORICO_MENSUAL'),
      gsheet('EN_DESARROLLO'),
    ]);

    D.pos10b = parsePosiciones(r10b);
    D.est    = parsePosiciones(rEst);
    D.rend   = parseRend(rRend);
    D.ops    = parseOps(rOps);
    D.dev    = parseDev(rDev);
    D.hist   = parseHist(rHist);

    // Actualizar valor actual de 10Bagger desde fila TOTAL de posiciones
    const tot10b = r10b.find(r => String(r[0]||'').includes('TOTAL'));
    if (tot10b && D.rend.length) {
      const v = typeof tot10b[6]==='number' ? tot10b[6] : toNum(tot10b[6]);
      if (v) D.rend[D.rend.length-1].b10_fin = v;
    }

    setBadge('bl','● En vivo');
    const t = nowStr();
    document.getElementById('lupd').textContent = 'Actualizado ' + t;
    setSt('Datos en tiempo real · ' + t);
    showTab(CUR);
  } catch(e) {
    setBadge('bd','⚠ Error');
    setSt('Error: ' + e.message);
    document.getElementById('mc').innerHTML = `<div class="ebox"><strong>Error al conectar.</strong><br>${e.message}</div>`;
    console.error(e);
  }
}

// ── TABS ─────────────────────────────────────────────────────
function showTab(tab) {
  CUR = tab;
  document.querySelectorAll('.tab').forEach((el,i) =>
    el.classList.toggle('active', ['rent','10b','qh'][i] === tab));
  killCharts();
  const mc = document.getElementById('mc');
  if (tab === 'rent') {
    mc.innerHTML = buildRentHTML();
    setTimeout(buildRentCharts, 80);
  } else if (tab === '10b') {
    mc.innerHTML = buildCarteraHTML(D.pos10b, '10Bagger', '10b');
    setTimeout(() => buildCarteraCharts('10b', D.pos10b), 80);
  } else if (tab === 'est') {
    mc.innerHTML = buildEstudiadosHTML(D.est || []);
  } else if (tab === 'dev') {
    mc.innerHTML = buildDevHTML(D.dev || []);
  }
}

// ── CÁLCULO DE PERÍODOS ───────────────────────────────────────
function calcPeriods() {
  const rend = D.rend;
  if (!rend || !rend.length) return null;

  // Factor de ajuste EUR por período: divide rentabilidad USD por variación fx (EUR/USD)
  // Si el euro sube (fx_fin > fx_ini), rentabilidad en EUR < USD
  function eurAdj(rentUSD, r) {
    if (rentUSD === null || !r.fx_ini || !r.fx_fin) return null;
    return ((1 + rentUSD/100) / (r.fx_fin/r.fx_ini) - 1) * 100;
  }

  function rentPeriodo(r) {
    const spx = r.spx_ini && r.spx_fin ? ((r.spx_fin/r.spx_ini)-1)*100 : null;
    const ndx = r.ndx_ini && r.ndx_fin ? ((r.ndx_fin/r.ndx_ini)-1)*100 : null;
    return {
      b10: r.b10_ini && r.b10_fin ? ((r.b10_fin/r.b10_ini)-1)*100 : null,
      spx, ndx,
      spx_eur: eurAdj(spx, r),
      ndx_eur: eurAdj(ndx, r),
    };
  }

  function acumN(n) {
    const slice = rend.slice(-n);
    let b10=1, spx=1, ndx=1, spxE=1, ndxE=1;
    for (const r of slice) {
      if (r.b10_ini && r.b10_fin) b10 *= r.b10_fin/r.b10_ini;
      if (r.spx_ini && r.spx_fin) { const f=r.spx_fin/r.spx_ini; spx*=f; if(r.fx_ini&&r.fx_fin) spxE*=f/(r.fx_fin/r.fx_ini); }
      if (r.ndx_ini && r.ndx_fin) { const f=r.ndx_fin/r.ndx_ini; ndx*=f; if(r.fx_ini&&r.fx_fin) ndxE*=f/(r.fx_fin/r.fx_ini); }
    }
    return {
      b10:(b10-1)*100, spx:(spx-1)*100, ndx:(ndx-1)*100,
      spx_eur:(spxE-1)*100, ndx_eur:(ndxE-1)*100,
    };
  }

  function cagrTotal() {
    const totalDias = rend.reduce((s,r) => s+(r.dias||0), 0);
    const years = totalDias / 365.25;
    const f = rend[0], l = rend[rend.length-1];
    let spxAcum=1, ndxAcum=1, spxEAcum=1, ndxEAcum=1;
    for (const r of rend) {
      if (r.spx_ini&&r.spx_fin) { const v=r.spx_fin/r.spx_ini; spxAcum*=v; if(r.fx_ini&&r.fx_fin) spxEAcum*=v/(r.fx_fin/r.fx_ini); }
      if (r.ndx_ini&&r.ndx_fin) { const v=r.ndx_fin/r.ndx_ini; ndxAcum*=v; if(r.fx_ini&&r.fx_fin) ndxEAcum*=v/(r.fx_fin/r.fx_ini); }
    }
    return {
      b10: f.b10_ini&&l.b10_fin ? (Math.pow(l.b10_fin/f.b10_ini,1/years)-1)*100 : null,
      spx: (Math.pow(spxAcum,1/years)-1)*100,
      ndx: (Math.pow(ndxAcum,1/years)-1)*100,
      spx_eur: (Math.pow(spxEAcum,1/years)-1)*100,
      ndx_eur: (Math.pow(ndxEAcum,1/years)-1)*100,
    };
  }

  const totalDiasAcum = rend.reduce((s,r) => s+(r.dias||0), 0);
  const ytd = rentPeriodo(rend[rend.length-1]);
  const a1  = rend.length >= 2 ? rentPeriodo(rend[rend.length-2]) : null;
  const a2  = totalDiasAcum >= 2*365 ? acumN(2) : null;
  const a3  = totalDiasAcum >= 3*365 ? acumN(3) : null;
  const a4  = totalDiasAcum >= 4*365 ? acumN(4) : null;
  const all = acumN(rend.length);
  const cr  = cagrTotal();

  return { ytd, '1y':a1, '2y':a2, '3y':a3, '4y':a4, all, cagr:cr };
}

// ── RENTABILIDAD HTML ─────────────────────────────────────────
function buildRentHTML() {
  const periods = calcPeriods();
  if (!periods) return '<div class="ebox">Sin datos de rentabilidad. Comprueba la pestaña REND_SIMPLE en el sheet.</div>';

  const p = periods[curPeriod] || periods.ytd;
  const labels = {ytd:'Año en curso','1y':'Año anterior','2y':'2 años','3y':'3 años','4y':'4 años',all:'Desde inicio',cagr:'CAGR anualizada'};

  const btns = Object.entries(labels).filter(([k]) => periods[k]).map(([k,v]) =>
    `<button class="pbtn${k===curPeriod?' active':''}" onclick="setPeriod('${k}')">${v}</button>`
  ).join('');

  function card(label, val, valEur) {
    const cls = val===null ? '' : val>=0 ? 'pos' : 'neg';
    const eurLine = valEur !== undefined && valEur !== null
      ? `<div class="msub" style="color:${valEur>=0?'var(--green)':'var(--red)'}">EUR: ${fmtP(valEur)}</div>`
      : '';
    return `<div class="metric"><div class="mlbl">${label}</div><div class="mval ${cls}">${fmtP(val)}</div>${eurLine}</div>`;
  }

  // Años para el gráfico de barras
  const años = D.rend.map(r => r.label);

  return `
<div class="pbtns">${btns}</div>
<div class="mgrid">
  ${card('10Bagger', p.b10)}
  ${card('S&P 500', p.spx, p.spx_eur)}
  ${card('Nasdaq-100', p.ndx, p.ndx_eur)}
</div>
<div class="cwrap">
  <div class="ctit">Comparativa — ${labels[curPeriod]||curPeriod}</div>
  <div class="chart-rent" style="position:relative;height:200px"><canvas id="c-comp"></canvas></div>
</div>
<div class="cwrap">
  <div class="ctit">Rentabilidad anual por año</div>
  <div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px;color:var(--text2)">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;display:inline-block"></span>10Bagger</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#B4B2A9;display:inline-block"></span>S&P 500</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D3D1C7;display:inline-block"></span>Nasdaq-100</span>
  </div>
  <div class="chart-rent" style="position:relative;height:220px"><canvas id="c-anual"></canvas></div>
</div>`;
}

function setPeriod(k) {
  curPeriod = k;
  killCharts();
  document.getElementById('mc').innerHTML = buildRentHTML();
  setTimeout(buildRentCharts, 80);
}

function buildRentCharts() {
  const periods = calcPeriods();
  if (!periods) return;
  const p = periods[curPeriod] || periods.ytd;
  if (!p) return;

  // Comparativa
  const elC = document.getElementById('c-comp');
  if (elC) {
    CH.comp = new Chart(elC, {
      type:'bar',
      data:{
        labels:['10Bagger','S&P 500','Nasdaq-100'],
        datasets:[{
          data:[p.b10, p.spx, p.ndx],
          backgroundColor:['#378ADD','#888780','#B4B2A9'],
          borderRadius:4, borderWidth:0
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${fmtP(c.raw)}`}}},
        scales:{
          x:{ticks:{font:{size:11}}, grid:{display:false}},
          y:{ticks:{font:{size:10}, color:'#888', callback:v=>v+'%'}, grid:{color:'rgba(128,128,128,0.08)'}}
        }
      }
    });
  }

  // Barras anuales
  const elA = document.getElementById('c-anual');
  if (elA) {
    const años = D.rend.map(r => r.label);
    const d10b = D.rend.map(r => r.b10_ini&&r.b10_fin ? +((r.b10_fin/r.b10_ini-1)*100).toFixed(2) : null);
    const dSPX = D.rend.map(r => r.spx_ini&&r.spx_fin ? +((r.spx_fin/r.spx_ini-1)*100).toFixed(2) : null);
    const dNDX = D.rend.map(r => r.ndx_ini&&r.ndx_fin ? +((r.ndx_fin/r.ndx_ini-1)*100).toFixed(2) : null);
    CH.anual = new Chart(elA, {
      type:'bar',
      data:{
        labels:años,
        datasets:[
          {label:'10Bagger',   data:d10b, backgroundColor:'#378ADD', borderRadius:3, borderWidth:0},
          {label:'S&P 500',    data:dSPX, backgroundColor:'#B4B2A9', borderRadius:3, borderWidth:0},
          {label:'Nasdaq-100', data:dNDX, backgroundColor:'#D3D1C7', borderRadius:3, borderWidth:0},
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmtP(c.raw)}`}}},
        scales:{
          x:{ticks:{font:{size:11}}, grid:{display:false}},
          y:{ticks:{font:{size:10}, color:'#888', callback:v=>v+'%'}, grid:{color:'rgba(128,128,128,0.08)'}}
        }
      }
    });
  }
}

  if (!ops.length) return '<div style="color:var(--text3);font-size:12px;padding:.5rem 0">Sin operaciones registradas</div>';

  const tipoCls = {
    'APERTURA': 'op-ap',
    'CIERRE':   'op-ci',

    'RECORTE':  'op-re',

  return ops.slice(0, 20).map(o => {
    const cls = tipoCls[o.tipo] || 'op-re';
    return `<div style="display:grid;grid-template-columns:72px 1fr auto;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)">
      <span class="${cls}" style="text-align:center;width:72px">${o.tipo}</span>

  }).join('');
}

// ── PARSER EN DESARROLLO ────────────────────────────────────
function parseDev(rows) {
  return rows.filter(r => r[0] && String(r[0]).trim() && !String(r[0]).startsWith('Concepto'))
    .map(r => ({
      concepto: String(r[0]||'').trim(),
      tipo:     String(r[1]||'').trim(),
      pista:    String(r[2]||'').trim(),
      fecha:    String(r[3]||'').trim(),
      notas:    String(r[4]||'').trim(),
    })).filter(r => r.tipo);
}

// ── EN DESARROLLO HTML ────────────────────────────────────────
function buildDevHTML(items) {
  if (!items.length) return '<div class="ebox">Sin datos en la pestaña EN_DESARROLLO del sheet.</div>';

  const tipoConfig = {
    'Tesis':           { icon:'🔍', color:'#185fa5', bg:'#e6f1fb' },
    'Investigación':   { icon:'🧪', color:'#0f6e56', bg:'#e1f5ee' },
    'Artículo':        { icon:'✍️',  color:'#854f0b', bg:'#faeeda' },
    'Modelo financiero':{ icon:'📊', color:'#533AB7', bg:'#ede8fb' },
    'Herramienta':     { icon:'🛠️',  color:'#D85A30', bg:'#fce8e0' },
  };

  const grupos = {};
  items.forEach(i => {
    const t = i.tipo.trim();
    if (!grupos[t]) grupos[t] = [];
    grupos[t].push(i);
  });

  // Ordenar por fecha: primero los que tienen fecha (más próxima primero), luego sin fecha
  const sorted = [...items].sort((a, b) => {
    const parseF = f => {
      if (!f || f === 'Sin decidir' || f === '—') return null;
      // "Semana del 16", "Semana del 23" → extraer número
      const semana = f.match(/Semana del (\d+)/i);
      if (semana) return parseInt(semana[1]);
      // "Comienzo abril" → 100 (mes próximo, después de semanas)
      if (f.toLowerCase().includes('abril') || f.toLowerCase().includes('mayo')) return 200;
      // fecha real AAAA-MM-DD
      const d = new Date(f);
      if (!isNaN(d)) return d.getTime() / 1000000;
      return null;
    };
    const fa = parseF(a.fecha), fb = parseF(b.fecha);
    if (fa === null && fb === null) return 0;
    if (fa === null) return 1;
    if (fb === null) return -1;
    return fa - fb;
  });

  const cards = sorted.map(item => {
    const tipo = item.tipo.trim();
    const cfg = tipoConfig[tipo] || { icon:'📌', color:'#6b6b66', bg:'#f0f0ed' };
    const notasBadge = item.notas
      ? `<div style="font-size:11px;color:var(--text2);margin-top:6px;font-style:italic">${item.notas}</div>`
      : '';
    return `
    <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="background:${cfg.bg};color:${cfg.color};font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px">
          ${cfg.icon} ${tipo}
        </span>
        <span style="font-size:11px;color:var(--text3)">📅 ${item.fecha || '—'}</span>
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-top:2px">${item.pista || '—'}</div>
      ${notasBadge}
    </div>`;
  }).join('');

  // Contador por tipo
  const resumen = Object.entries(grupos).map(([tipo, arr]) => {
    const cfg = tipoConfig[tipo.trim()] || { icon:'📌', color:'#6b6b66', bg:'#f0f0ed' };
    return `<div style="display:flex;align-items:center;gap:6px;font-size:12px">
      <span style="background:${cfg.bg};color:${cfg.color};padding:2px 8px;border-radius:12px;font-weight:600">${cfg.icon} ${tipo}: ${arr.length}</span>
    </div>`;
  }).join('');

  return `
<div style="margin-bottom:16px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600">${items.length} publicaciones en preparación</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${resumen}</div>
  </div>
  <div class="dev-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
    ${cards}
  </div>
</div>`;
}

// ── ESTUDIADOS HTML ──────────────────────────────────────────
function buildEstudiadosHTML(pos) {
  const activos = (pos||[]).filter(p => p.ticker && p.ticker !== 'LIQUIDEZ' && p.empresa !== '—');
  if (!activos.length) return '<div class="ebox">Sin datos en la pestaña ESTUDIADOS del sheet.</div>';

  const conCagr = activos.filter(p => p.cagr3y !== null && p.cagr3y !== undefined);

  const rows = activos.map(p => {
    const gf = `https://www.google.com/finance/quote/${encodeURIComponent(p.ticker.replace(':','.'))}`;
    const rv = parseInt(p.riesgo)||0;
    const rc = rv<=3?'rlo':rv<=6?'rmd':'rhi';
    const tL = p.urlTesis ? `<a href="${p.urlTesis}" target="_blank" class="ilink ilink-tesis">✍ Tesis</a>` : '';
    const mL = p.urlModelo ? `<a href="${p.urlModelo}" target="_blank" class="ilink ilink-modelo">📊 Modelo</a>` : '';
    const cagrFmt = p.cagr3y !== null ? (p.cagr3y >= 0 ? '+' : '') + p.cagr3y.toFixed(1) + '%' : '—';
    const cagrCls = p.cagr3y !== null ? (p.cagr3y >= 0 ? 'pos' : 'neg') : '';
    const tooltip = p.resumen ? `title="${p.resumen.replace(/"/g, '&quot;')}"` : '';
    return `<tr>
      <td ${tooltip} style="${p.resumen ? 'cursor:help' : ''}">${p.empresa}<span class="tsub"><a href="${gf}" target="_blank" style="color:var(--blue);text-decoration:none">${p.ticker}</a></span></td>
      <td>${p.moneda}</td>
      <td>${p.precio}</td>
      <td style="font-weight:500">${p.po}</td>
      <td class="${cagrCls}" style="font-weight:600">${cagrFmt}</td>
      <td>${p.riesgo!=='—'?`<span class="risk ${rc}">${p.riesgo}</span>`:'—'}</td>
      <td style="text-align:right">${tL}${mL}</td>
    </tr>`;
  }).join('');

  return `
<div class="card">
  <div class="ch">
    <span class="ct">Valores estudiados — fuera de cartera</span>
    <span class="cm">${activos.length} empresas · ${conCagr.length} con P.O.</span>
  </div>
  <div class="ox"><table>
    <thead><tr>
      <th style="width:28%;text-align:left">Empresa</th>
      <th>Moneda</th><th>Precio actual</th><th>P.O. 3a</th>
      <th>CAGR 3a</th><th>Riesgo</th>
      <th style="text-align:right">Links</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
</div>`;
}

// ── CARTERA HTML ──────────────────────────────────────────────
function buildCarteraHTML(pos, nombre, id) {
  const activos = (pos||[]).filter(p => p.ticker !== 'LIQUIDEZ');
  const liq = (pos||[]).find(p => p.ticker === 'LIQUIDEZ');

  // CAGR medio ponderado por peso (solo posiciones con PO)
  const conCagr = activos.filter(p => p.cagr3y !== null && p.peso > 0);
  const pesoTotal = conCagr.reduce((s, p) => s + p.peso, 0);
  const cagrPonderado = pesoTotal > 0
    ? conCagr.reduce((s, p) => s + p.cagr3y * (p.peso / pesoTotal), 0)
    : null;
  const cagrPondFmt = cagrPonderado !== null
    ? (cagrPonderado >= 0 ? '+' : '') + cagrPonderado.toFixed(1) + '%'
    : '—';
  const pctConPO = pesoTotal > 0 ? pesoTotal.toFixed(1) + '% de la cartera' : '';

  const rows = (pos||[]).map(p => {
    const gf = `https://www.google.com/finance/quote/${encodeURIComponent(p.ticker.replace(':','.'))}`;
    const rv = parseInt(p.riesgo)||0;
    const rc = rv<=3?'rlo':rv<=6?'rmd':'rhi';
    const tL = p.urlTesis ? `<a href="${p.urlTesis}" target="_blank" class="ilink ilink-tesis">✍ Tesis</a>`
              : p.tieneTesis ? `<span class="ilink" style="opacity:.3;cursor:default">✍ Tesis</span>` : '';
    const mL = p.urlModelo ? `<a href="${p.urlModelo}" target="_blank" class="ilink ilink-modelo">📊 Modelo</a>`
              : p.tieneModelo ? `<span class="ilink" style="opacity:.3;cursor:default">📊 Modelo</span>` : '';
    const cagrFmt = p.cagr3y !== null ? (p.cagr3y >= 0 ? '+' : '') + p.cagr3y.toFixed(1) + '%' : '—';
    const cagrCls = p.cagr3y !== null ? (p.cagr3y >= 0 ? 'pos' : 'neg') : '';
    const tooltip = p.resumen ? `title="${p.resumen.replace(/"/g, '&quot;')}"` : '';
    const antFmt = p.antiguedad !== null && p.antiguedad !== undefined
      ? p.antiguedad < 1 ? p.antiguedad.toFixed(1) + 'a' : p.antiguedad.toFixed(1) + 'a'
      : '—';
    return `<tr>
      <td ${tooltip} style="${p.resumen ? 'cursor:help' : ''}">${p.empresa}<span class="tsub"><a href="${gf}" target="_blank" style="color:var(--blue);text-decoration:none">${p.ticker}</a></span></td>
      <td class="col-hide-mobile" style="color:var(--text2)">${p.geo || '—'}</td>
      <td class="col-hide-mobile">${p.moneda}</td><td class="col-hide-mobile">${p.precio}</td>
      <td class="col-hide-mobile" style="font-weight:500">${p.po}</td>
      <td class="${cagrCls}" style="font-weight:600">${cagrFmt}</td>
      <td style="font-weight:600">${p.pesoFmt}</td>
      <td class="col-hide-mobile" style="color:var(--text2);font-size:11px">${antFmt}</td>
      <td>${p.riesgo!=='—'?`<span class="risk ${rc}">${p.riesgo}</span>`:'—'}</td>
      <td style="text-align:right">${tL}${mL}</td>
    </tr>`;
  }).join('');

  // Donut geografía
  const geoMap = {};
  activos.forEach(p => {
    if (!p.geo || !p.peso) return;
    geoMap[p.geo] = (geoMap[p.geo]||0) + p.peso;
  });
  const geoLabels = Object.keys(geoMap);
  const geoVals   = geoLabels.map(g => +geoMap[g].toFixed(1));

  return `
<div class="mgrid" style="margin-bottom:16px">
  ${cagrPonderado !== null ? `
  <div class="metric">
    <div class="mlbl">CAGR esperado ponderado</div>
    <div class="mval ${cagrPonderado >= 0 ? 'pos' : 'neg'}">${cagrPondFmt}</div>
    <div class="msub">${pctConPO} con P.O.</div>
  </div>` : ''}
  ${liq ? `
  <div class="metric">
    <div class="mlbl">Liquidez</div>
    <div class="mval">${liq.pesoFmt}</div>
    <div class="msub">${activos.length} posiciones activas</div>
  </div>` : ''}
  <div class="metric">
    <div class="mlbl">Riesgo medio ponderado</div>
    <div class="mval">${(() => {
      const conR = activos.filter(p => p.riesgo !== '—' && p.peso > 0);
      const pt = conR.reduce((s,p) => s + p.peso, 0);
      return pt > 0 ? (conR.reduce((s,p) => s + (parseInt(p.riesgo)||0) * (p.peso/pt), 0)).toFixed(1) : '—';
    })()}<span style="font-size:13px;font-weight:400">/10</span></div>
    <div class="msub">ponderado por peso</div>
  </div>
</div>
<div class="cgrid">
  <div class="cwrap" style="margin-bottom:0">
    <div class="ctit">Composición ${nombre}</div>
    <div class="donut-wrapper" style="display:flex;gap:0;align-items:stretch">
      <div style="flex:1;position:relative;height:340px"><canvas id="c-donut-${id}"></canvas></div>
      <div id="tesis-panel-${id}" class="tesis-panel-mobile" style="display:none;width:220px;padding:14px 14px 14px 12px;border-left:0.5px solid var(--border);overflow-y:auto;max-height:340px"></div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:center">Haz clic en un segmento para ver la tesis</div>
  </div>
  <div class="cwrap" style="margin-bottom:0">
    <div class="ctit">Distribución geográfica</div>
    <div style="position:relative;height:200px"><canvas id="c-geo-${id}"></canvas></div>
    <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);overflow-y:auto;max-height:160px">
      <div class="ctit" style="margin-bottom:8px">Últimos movimientos</div>
      ${renderOpsHTML()}
    </div>
  </div>
</div>
<div class="card">
  <div class="ch">
    <span class="ct">Posiciones — ${nombre}</span>
    <span class="cm">${activos.length} valores${liq?' · liquidez '+liq.pesoFmt:''}</span>
  </div>
  <div class="ox"><table>
    <thead><tr>
      <th style="width:22%;text-align:left">Empresa</th>
      <th class="col-hide-mobile">Geografía</th><th class="col-hide-mobile">Moneda</th><th class="col-hide-mobile">Precio</th><th class="col-hide-mobile">P.O. 3a</th><th>CAGR 3a</th><th>Peso</th><th class="col-hide-mobile">Antigüedad</th><th>Riesgo</th>
      <th style="text-align:right">Links</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
</div>`;
}

function buildCarteraCharts(id, pos) {
  const activos = (pos||[]).filter(p => p.ticker !== 'LIQUIDEZ' && p.peso > 0);

  // Donut con labels dentro
  const elD = document.getElementById(`c-donut-${id}`);
  if (elD && activos.length) {
    const activosSorted = [...activos].sort((a,b) => b.peso - a.peso);

    const donutClick = (evt) => {
      const chart = CH[`d-${id}`];
      if (!chart) return;
      const pts = chart.getElementsAtEventForMode(evt, 'nearest', {intersect:true}, false);
      if (!pts.length) return;
      const idx = pts[0].index;
      const pos = activosSorted[idx];
      const panel = document.getElementById('tesis-panel-' + id);
      if (!panel || !pos.resumen) return;
      const tL = pos.urlTesis ? `<a href="${pos.urlTesis}" target="_blank" class="ilink ilink-tesis" style="margin-top:8px;display:inline-flex">✍ Tesis completa</a>` : '';
      panel.style.display = 'block';
      panel.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:13px;font-weight:700">${pos.empresa.split(' ').slice(0,2).join(' ')}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:1px">${pos.ticker} · ${pos.pesoFmt}</div>
          </div>
          <button onclick="document.getElementById('tesis-panel-${id}').style.display='none'"
            style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0">×</button>
        </div>
        <div style="font-size:11px;line-height:1.7;color:var(--text2)">${pos.resumen}</div>
        <div style="margin-top:12px">${tL}</div>`;
    };

    CH[`d-${id}`] = new Chart(elD, {
      type:'doughnut',
      data:{
        labels: activosSorted.map(p=>p.ticker.split(':').pop()),
        datasets:[{data:activosSorted.map(p=>p.peso), backgroundColor:COLS, borderWidth:2, borderColor:'rgba(255,255,255,0.15)'}]
      },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:'52%',
        onClick: donutClick,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>{
            const p = activosSorted[c.dataIndex];
            return ` ${c.label}: ${c.raw.toFixed(1)}%${p && p.resumen ? ' · clic para tesis' : ''}`;
          }}}
        }
      },
      plugins:[{
        id:'labels',
        afterDraw(chart) {
          const {ctx, chartArea:{left,right,top,bottom}} = chart;
          const cx=(left+right)/2, cy=(top+bottom)/2;
          const meta = chart.getDatasetMeta(0);
          meta.data.forEach((arc,i) => {
            if (activosSorted[i].peso < 3.5) return;
            const angle = (arc.startAngle+arc.endAngle)/2;
            const r = (arc.outerRadius+arc.innerRadius)/2;
            const x = cx+Math.cos(angle)*r, y = cy+Math.sin(angle)*r;
            ctx.save();
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.font='bold 11px -apple-system,sans-serif'; ctx.fillStyle='#fff';
            ctx.fillText(activosSorted[i].ticker.split(':').pop(), x, y-6);
            ctx.font='10px -apple-system,sans-serif';
            ctx.fillText(activosSorted[i].peso.toFixed(1)+'%', x, y+6);
            ctx.restore();
          });
        }
      }]
    });
  }

  // Donut geografía
  const elG = document.getElementById('c-geo-' + id);
  if (elG) {
    const geoMap = {};
    activos.forEach(p => { if (p.geo && p.peso) geoMap[p.geo] = (geoMap[p.geo]||0) + p.peso; });
    const geoL = Object.keys(geoMap);
    const geoV = geoL.map(g => +geoMap[g].toFixed(1));
    const geoCols = ['#378ADD','#1D9E75','#EF9F27','#D4537E','#533AB7','#D85A30'];
    CH['g-'+id] = new Chart(elG, {
      type:'doughnut',
      data:{ labels:geoL, datasets:[{ data:geoV, backgroundColor:geoCols, borderWidth:2, borderColor:'rgba(255,255,255,0.15)' }] },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:'52%',
        plugins:{
          legend:{ display:true, position:'bottom', labels:{ boxWidth:10, boxHeight:10, font:{size:11}, padding:10 } },
          tooltip:{ callbacks:{ label:c=>` ${c.label}: ${c.raw.toFixed(1)}%` } }
        }
      },
      plugins:[{
        id:'geoLabels',
        afterDraw(chart) {
          const {ctx, chartArea:{left,right,top,bottom}} = chart;
          const cx=(left+right)/2, cy=(top+bottom)/2;
          chart.getDatasetMeta(0).data.forEach((arc,i) => {
            if (geoV[i] < 8) return;
            const angle=(arc.startAngle+arc.endAngle)/2;
            const r=(arc.outerRadius+arc.innerRadius)/2;
            ctx.save();
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.font='bold 11px -apple-system,sans-serif'; ctx.fillStyle='#fff';
            ctx.fillText(geoV[i].toFixed(1)+'%', cx+Math.cos(angle)*r, cy+Math.sin(angle)*r);
            ctx.restore();
          });
        }
      }]
    });
  }
}
</script>
</body>
</html>
