<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Bagger Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f7f7f5;--bg2:#fff;--bg3:#f0f0ed;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9e9e99;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --green:#0f6e56;--green-bg:#e1f5ee;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#242422;--bg3:#2e2e2b;
  --text:#e8e8e4;--text2:#9e9e99;--text3:#6b6b66;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#5dcaa5;--green-bg:#04342c;
  --blue:#85b7eb;--blue-bg:#042c53;
  --amber:#ef9f27;--amber-bg:#412402;
  --red:#f09595;--red-bg:#501313;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.lcard{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:2.5rem;width:100%;max-width:380px}
.llogo{font-size:24px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.lsub{font-size:13px;color:var(--text2);margin-bottom:2rem}
.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
input[type=password],input[type=text]{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:inherit}
input:focus{border-color:var(--blue)}
.btnp{width:100%;padding:10px;border-radius:var(--rs);background:var(--text);color:var(--bg2);border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.btnp:hover{opacity:.85}
#lerr{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
.ssec{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid var(--border)}
.hint{font-size:11px;color:var(--text3);line-height:1.6;margin-top:4px}

/* DASHBOARD */
#dash{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.brand{font-size:15px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.bl{background:var(--green-bg);color:var(--green)}
.bd{background:var(--amber-bg);color:var(--amber)}
.bc{background:var(--blue-bg);color:var(--blue)}
.tright{display:flex;align-items:center;gap:8px}
.bsm{font-size:12px;padding:5px 12px;border-radius:var(--rs);cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit}
.bsm:hover{background:var(--bg3)}
.utime{font-size:11px;color:var(--text3)}
.main{padding:18px 20px;flex:1}
.sbar{font-size:11px;color:var(--text3);padding:7px 20px;text-align:right;border-top:0.5px solid var(--border);background:var(--bg2)}

/* MÉTRICAS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg3);border-radius:var(--rs);padding:13px 15px}
.mlbl{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.mval{font-size:22px;font-weight:700;letter-spacing:-0.5px;line-height:1.1}
.msub{font-size:11px;margin-top:3px;color:var(--text2)}
.pos{color:var(--green)}.neg{color:var(--red)}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.ch{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.ct{font-size:13px;font-weight:600;letter-spacing:-0.2px}
.cm{font-size:11px;color:var(--text2)}
.ox{overflow-x:auto}

/* TABLA */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;color:var(--text2);font-weight:500;padding:8px 13px;text-align:right;border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap}
th:first-child{text-align:left}
td{padding:9px 13px;text-align:right;border-bottom:0.5px solid var(--border);white-space:nowrap;vertical-align:middle}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.tsub{font-size:10px;color:var(--text3);display:block;margin-top:1px;font-weight:400}

/* BADGES */
.risk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:600}
.rlo{background:var(--green-bg);color:var(--green)}
.rmd{background:var(--amber-bg);color:var(--amber)}
.rhi{background:var(--red-bg);color:var(--red)}
.ilink{display:inline-flex;align-items:center;height:17px;padding:0 5px;border-radius:3px;border:0.5px solid var(--border2);color:var(--text2);text-decoration:none;font-size:10px;font-weight:500;margin-left:3px;vertical-align:middle}
.ilink:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}

/* GRÁFICOS */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:580px){.cgrid{grid-template-columns:1fr}}
.cwrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.ctit{font-size:10px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2)}
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.leg span{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* SPINNER */
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.ebox{background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--rs);padding:14px;font-size:13px;color:var(--amber);margin-bottom:16px;line-height:1.7}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="llogo">10Bagger Portfolio</div>
    <div class="lsub">Panel privado de inversiones</div>
    <label class="lbl">Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btnp" onclick="doLogin()">Entrar</button>
    <div id="lerr"></div>
    <div class="ssec">
      <label class="lbl">ID de Google Sheet</label>
      <input type="text" id="sid" value="1i9fgIwGdBx7p_fBqm95AL8betZ_Db57jPYPDXNMTqFo">
      <div class="hint">El sheet debe estar compartido como "Cualquiera con el enlace puede ver"</div>
    </div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="brand">10Bagger Portfolio <span class="badge bc" id="badge">⟳ Cargando</span></div>
    <div class="tright">
      <span class="utime" id="lupd"></span>
      <button class="bsm" onclick="loadData()">↻ Actualizar</button>
      <button class="bsm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="main" id="mc"><div style="padding:3rem;text-align:center;color:var(--text2)"><span class="spin"></span> Conectando...</div></div>
  <div class="sbar" id="sb"></div>
</div>

<script>
const PWD = "cartera2024";
const COLS = ["#378ADD","#1D9E75","#EF9F27","#D4537E","#533AB7","#D85A30","#639922","#3B8BD4","#BA7517","#0F6E56","#993556","#5F5E5A","#C55A11","#4472C4","#ED7D31","#A9D18E","#9DC3E6","#F4B183"];
let SID = "1i9fgIwGdBx7p_fBqm95AL8betZ_Db57jPYPDXNMTqFo";
let D = {}, CH = {};

// ── PARSEO ────────────────────────────────────────────────
// Convierte string español a número: "30.059,72 €" → 30059.72 | "9,2%" → 9.2
function num(v) {
  if (v === null || v === undefined) return 0;
  let s = String(v).trim();
  s = s.replace(/[€$£%\s]/g, '');
  s = s.replace(/[^\d,.\-]/g, '');
  if (!s) return 0;
  if (s.includes('.') && s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
  else if (s.includes(',')) s = s.replace(',', '.');
  return parseFloat(s) || 0;
}
function fmt(v) { return v !== null && v !== undefined && String(v).trim() !== '' ? String(v).trim() : '—'; }
function now() { return new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }
function setStatus(m) { document.getElementById('sb').innerHTML = m; }
function setBadge(cls, txt) { const b = document.getElementById('badge'); b.className = 'badge ' + cls; b.textContent = txt; }

// ── AUTH ─────────────────────────────────────────────────
function doLogin() {
  if (document.getElementById('pwd').value !== PWD) {
    document.getElementById('lerr').textContent = 'Contraseña incorrecta'; return;
  }
  document.getElementById('lerr').textContent = '';
  SID = document.getElementById('sid').value.trim() || SID;
  document.getElementById('login').style.display = 'none';
  document.getElementById('dash').style.display = 'flex';
  loadData();
}
function doLogout() {
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

// ── FETCH ────────────────────────────────────────────────
async function fetchSheet(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
  const res = await fetch(url);
  const text = await res.text();
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Sin respuesta de Google Sheets');
  const tbl = JSON.parse(m[1]).table;
  if (!tbl || !tbl.rows) return [];
  // Usar valor formateado (f) cuando existe — preserva el formato original del sheet
  return tbl.rows.map(row => row.c.map(c => {
    if (!c) return null;
    if (c.f !== null && c.f !== undefined) return c.f;
    return c.v !== null && c.v !== undefined ? c.v : null;
  }));
}

// ── PARSER POSICIONES ────────────────────────────────────
// Columnas: 0=Ticker, 1=Empresa, 2=Moneda, 3=NTit, 4=Precio, 5=FX, 6=ValorEUR, 7=Peso,
//           8=PO, 9=CAGR, 10=Riesgo, 11=URLTesis, 12=URLModelo
function parsePosiciones(rows) {
  const skip = ['POSICIONES', 'Rellena', 'Ticker', 'TOTAL', 'P.O.'];
  return rows.filter(r => {
    const t = String(r[0] || '').trim();
    return t && !skip.some(s => t.startsWith(s)) && r[6] && String(r[6]).includes('€');
  }).map(r => ({
    ticker:   String(r[0] || '').trim(),
    empresa:  fmt(r[1]),
    moneda:   fmt(r[2]),
    ntit:     fmt(r[3]),
    precio:   fmt(r[4]),
    fx:       fmt(r[5]),
    valorEUR: num(r[6]),
    valorFmt: fmt(r[6]),
    peso:     num(r[7]),
    pesoFmt:  fmt(r[7]),
    cagr:     r[9] ? fmt(r[9]) : '—',
    riesgo:   r[10] ? String(r[10]).trim() : '—',
    urlTesis: r[11] && String(r[11]).trim() !== 'Disponible' && String(r[11]).startsWith('http') ? String(r[11]).trim() : '',
    urlModelo:r[12] && String(r[12]).trim() !== 'Disponible' && String(r[12]).startsWith('http') ? String(r[12]).trim() : '',
    tieneTesis:  r[11] && String(r[11]).trim() === 'Disponible',
    tieneModelo: r[12] && String(r[12]).trim() === 'Disponible',
  }));
}

// ── LOAD ─────────────────────────────────────────────────
async function loadData() {
  setBadge('bc', '⟳ Cargando');
  setStatus('<span class="spin"></span> Conectando con Google Sheets...');
  try {
    const rows10b = await fetchSheet('POSICIONES_10BAGGER');
    D.pos10b = parsePosiciones(rows10b);
    setBadge('bl', '● En vivo');
    const t = now();
    document.getElementById('lupd').textContent = 'Actualizado ' + t;
    setStatus('Datos en tiempo real desde Google Sheets · ' + t);
    render();
  } catch(e) {
    setBadge('bd', '⚠ Error');
    setStatus('Error: ' + e.message);
    document.getElementById('mc').innerHTML = `<div class="ebox"><strong>No se pudo conectar con Google Sheets.</strong><br>Comprueba que el sheet está compartido como "Cualquiera con el enlace puede ver".<br><br>Error: ${e.message}</div>`;
  }
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  Object.values(CH).forEach(c => { try { c.destroy(); } catch(e) {} }); CH = {};

  const pos = (D.pos10b || []).filter(p => p.ticker !== 'LIQUIDEZ');
  const liq = D.pos10b ? D.pos10b.find(p => p.ticker === 'LIQUIDEZ') : null;
  const total = D.pos10b ? D.pos10b.reduce((s, p) => s + p.valorEUR, 0) : 0;
  const nPos = pos.length;

  // Mejor y peor por peso
  const sorted = [...pos].sort((a, b) => b.peso - a.peso);
  const top1 = sorted[0];
  const riesgoMedio = pos.length ? (pos.reduce((s, p) => s + (parseInt(p.riesgo) || 0), 0) / pos.length).toFixed(1) : '—';

  document.getElementById('mc').innerHTML = `
<div class="mgrid">
  <div class="metric"><div class="mlbl">Valor total cartera</div><div class="mval">€${total.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})}</div><div class="msub">${nPos} posiciones + liquidez</div></div>
  <div class="metric"><div class="mlbl">Mayor posición</div><div class="mval" style="font-size:16px">${top1 ? top1.empresa.split(' ')[0] : '—'}</div><div class="msub">${top1 ? top1.pesoFmt : '—'} del total</div></div>
  <div class="metric"><div class="mlbl">Liquidez</div><div class="mval">${liq ? liq.pesoFmt : '—'}</div><div class="msub">${liq ? liq.valorFmt : '—'}</div></div>
  <div class="metric"><div class="mlbl">Riesgo medio</div><div class="mval">${riesgoMedio}<span style="font-size:13px;font-weight:400">/10</span></div><div class="msub">media ponderada</div></div>
</div>

<div class="cgrid">
  <div class="cwrap" style="margin-bottom:0">
    <div class="ctit">Composición 10Bagger</div>
    <div class="leg" id="leg-donut"></div>
    <div style="position:relative;height:220px"><canvas id="c-donut"></canvas></div>
  </div>
  <div class="cwrap" style="margin-bottom:0">
    <div class="ctit">Peso por posición</div>
    <div style="position:relative;height:${pos.length * 28 + 40}px"><canvas id="c-bar"></canvas></div>
  </div>
</div>

<div class="card" style="margin-top:14px">
  <div class="ch">
    <span class="ct">Posiciones — 10Bagger</span>
    <span class="cm">${nPos} valores · total €${total.toLocaleString('es-ES',{maximumFractionDigits:0})}</span>
  </div>
  <div class="ox"><table>
    <thead><tr>
      <th style="width:28%;text-align:left">Empresa</th>
      <th>Moneda</th><th>Nº títulos</th><th>Precio</th>
      <th>Valor EUR</th><th>Peso</th><th>Riesgo</th><th>Links</th>
    </tr></thead>
    <tbody>
      ${(D.pos10b || []).map(p => {
        const gf = `https://www.google.com/finance/quote/${encodeURIComponent(p.ticker.replace(':','.'))}`;
        const rNum = parseInt(p.riesgo) || 0;
        const rCls = rNum <= 3 ? 'rlo' : rNum <= 6 ? 'rmd' : 'rhi';
        const tLink = p.urlTesis
          ? `<a href="${p.urlTesis}" target="_blank" class="ilink">Tesis</a>`
          : p.tieneTesis ? `<span class="ilink" style="opacity:.4">Tesis</span>` : '';
        const mLink = p.urlModelo
          ? `<a href="${p.urlModelo}" target="_blank" class="ilink">Modelo</a>`
          : p.tieneModelo ? `<span class="ilink" style="opacity:.4">Modelo</span>` : '';
        return `<tr>
          <td>${p.empresa}<span class="tsub"><a href="${gf}" target="_blank" style="color:var(--blue);text-decoration:none">${p.ticker}</a></span></td>
          <td>${p.moneda}</td>
          <td>${p.ntit}</td>
          <td>${p.precio}</td>
          <td style="font-weight:600">${p.valorFmt}</td>
          <td style="font-weight:600">${p.pesoFmt}</td>
          <td>${p.riesgo !== '—' ? `<span class="risk ${rCls}">${p.riesgo}</span>` : '—'}</td>
          <td style="text-align:right">${tLink}${mLink}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>
</div>`;

  // ── DONUT ────────────────────────────────────────────
  const donutData = pos;
  const leg = document.getElementById('leg-donut');
  if (leg) leg.innerHTML = donutData.map((p, i) =>
    `<span><span class="ld" style="background:${COLS[i % COLS.length]}"></span>${p.ticker.split(':').pop()} ${p.pesoFmt}</span>`
  ).join('');

  const elD = document.getElementById('c-donut');
  if (elD) CH.donut = new Chart(elD, {
    type: 'doughnut',
    data: {
      labels: donutData.map(p => p.ticker.split(':').pop()),
      datasets: [{
        data: donutData.map(p => p.peso),
        backgroundColor: COLS,
        borderWidth: 2,
        borderColor: 'rgba(255,255,255,0.15)'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw.toFixed(1)}%` } }
      }
    }
  });

  // ── BAR HORIZONTAL ───────────────────────────────────
  const barData = [...pos].sort((a, b) => b.peso - a.peso);
  const elB = document.getElementById('c-bar');
  if (elB) CH.bar = new Chart(elB, {
    type: 'bar',
    data: {
      labels: barData.map(p => p.ticker.split(':').pop()),
      datasets: [{
        data: barData.map(p => p.peso),
        backgroundColor: barData.map((_, i) => COLS[i % COLS.length]),
        borderRadius: 3, borderWidth: 0
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.raw.toFixed(1)}%` } }
      },
      scales: {
        x: { ticks: { font: {size:10}, color:'#888', callback: v => v + '%' }, grid: { color: 'rgba(128,128,128,0.08)' } },
        y: { ticks: { font: {size:11} }, grid: { display: false } }
      }
    }
  });
}
</script>
</body>
</html>
